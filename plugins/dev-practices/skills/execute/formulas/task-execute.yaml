name: task-execute
description: >
  Execute beads tasks through the full lifecycle: research, architect review,
  triage, implementation, and commit. Each atom is self-contained -- all research
  findings are stored in the beads task itself (notes + design fields), making
  every task a complete unit of context.

variables:
  TASK_IDS:
    description: "Space-separated beads task IDs to execute"
    required: true

labels:
  - "mol:task-execute"

# -- Setup (runs once before any task iteration) -------------------------------
setup:
  - id: "baseline"
    title: "Establish baseline -- zero failures"
    description: |
      Run the full quality suite BEFORE any code changes. This establishes the
      clean slate. Every failure after this point belongs to you.

      ## Instructions

      1. **Run quality gate**:
         ```bash
         make quality 2>&1 | tail -5
         ```
         Record the exact pass count.

      2. **Run integration tests** (if your project has them):
         Run the project's integration test command and record pass count.

      ## Gate -- HARD STOP on any failure

      If ANY test fails in the baseline:
      - Do NOT proceed to the next atom.
      - Do NOT classify failures as "pre-existing" or "from another agent."
      - Report the exact failures and leave this atom OPEN.

      ## Record Baseline

      ```bash
      bd update {EPIC_ID} --append-notes "## Baseline (pre-change)
      - Quality check: [N] passed, 0 failed
      - Integration: [N] passed, 0 failed
      - Total: [sum] passed, 0 failed"
      ```

    acceptance: "All gates pass with zero failures. Exact counts recorded in epic notes."
    labels: ["atom:baseline"]

iterate:
  over: "TASK_IDS"
  item_var: "TASK_ID"
  all_var: "ALL_TASKS"
  count_var: "N"
  barrier_label: "atom:commit"
  atoms:
    # -- Atom 1: Research ------------------------------------------------------
    - id: "research-{TASK_ID}"
      title: "Research {TASK_ID}"
      description: |
        Execute research for beads task {TASK_ID}. All findings go into the
        bead itself -- NOT the filesystem.

        ## Instructions

        1. **Read the task**: `bd show {TASK_ID}`
        2. **Spec check** (if task touches schemas/protocol):
           - Read relevant specs and schemas
           - Check required vs optional, type constraints
        3. **Explore the codebase**:
           - Search for relevant code
           - Read files that will need modification
           - Check existing tests for the affected area
           - Find 2-3 similar implementations to follow as patterns
        4. **Check documentation** (doc-first rule)
        5. **Engineering checklist** -- answer concretely:
           - DRY: Does similar logic exist?
           - Library idioms: How do your frameworks solve this?
           - Data flow trace: Walk one concrete example through the full chain
           - Existing conventions: What pattern do similar implementations follow?
           - Test infrastructure: What fixtures/helpers exist?
        6. **Identify architecture decisions**
        7. **Extract the core invariant** -- State in ONE sentence the architectural
           principle that ALL changes for this task must preserve.

        ## Store Research in the Bead

        ```bash
        bd update {TASK_ID} --append-notes "## Findings
        - [key findings]

        ## Relevant Code
        - path/to/file.py:line -- [description]

        ## Risks & Edge Cases
        - [potential issues]"

        bd update {TASK_ID} --design "## Core Invariant
        [One sentence: the architectural principle every change must preserve]

        ## Implementation Plan
        1. [first step]
        2. [second step]"
        ```

        ## Gate: Add Label

        ONLY after notes AND design are written:
        ```bash
        bd label add {TASK_ID} research:complete
        ```

      acceptance: "Task has research:complete label. Notes contain Findings. Design contains Core Invariant + Implementation Plan."
      depends_on: ["baseline"]
      labels: ["atom:research"]

    # -- Atom 1b: Codebase-wide disease scan -----------------------------------
    - id: "codebase-scan-{TASK_ID}"
      title: "Codebase-wide disease scan for {TASK_ID}"
      description: |
        Architectural changes are local-only by default. This atom forces the
        executor to look at the WHOLE codebase before designing the fix, so the
        design phase addresses every instance of the disease pattern — not just
        the motivating site.

        Background: a Jun-2026 multi-agent code review surfaced 41 verified
        findings (1 Critical, 10 High, 9 Medium) — overwhelmingly cases where a
        canonical helper existed but the majority of call sites bypassed it,
        because previous tickets fixed the motivating site only. This atom is
        the structural counter-measure.

        ## Precondition

        `bd show {TASK_ID}` shows the `research:complete` label.

        ## Instructions

        1. **Identify the disease pattern** from the design field. Write it
           as a one-line spec: "What anti-pattern is this ticket eliminating?"
           Examples:
             - "raw getattr(state, X) on state instead of bus.get/get_required"
             - "f-string per-key field-name joins instead of output_field_name(...)"
             - "next(iter(x.values())) on outputs instead of normalize_outputs(x).primary"
             - "module-level mutable dict in src/<pkg>/"
             - "two-named alias for the same helper (e.g. _isinstance_safe / _is_instance_safe)"

        2. **Scan the WHOLE codebase** for this pattern. Use grep / AST search
           across the entire source tree (NOT just the cited files in the
           ticket). Concrete techniques:
             - Pattern grep: `grep -rn '<regex>' src/<pkg>/`
             - AST scan: `python -c "import ast; ..."` for syntactic patterns
             - Type-check: `mypy --strict` if relevant
             - Dual-name search: `git grep -E '_(is)?_?instance_safe'`

        3. **Produce a disposition table** in the bead notes. Every instance
           found must appear:

           ```
           ## Codebase Disease Scan ({TASK_ID})

           Pattern: <one-line spec>
           Scan command: <exact command, reproducible>
           Total instances found: <N>

           | # | File:line | Form | Disposition | Reason |
           |---|-----------|------|-------------|--------|
           | 1 | foo.py:42 | f"{x}_{key}" | MIGRATE | use output_field_name |
           | 2 | bar.py:101 | f"{x}_{key}" | ALLOWLIST | not a field-name join — base path concat |
           | 3 | baz.py:55 | f"{x}_{key}" | DEFER | scope explosion — file new ticket neograph-XXXX |
           ```

           Allowed dispositions:
           - **MIGRATE**: this ticket fixes the instance
           - **ALLOWLIST**: the instance is a false positive (the pattern matches but the semantic is different); the reason must be specific enough to justify
           - **DEFER**: out of scope for this ticket; a NAMED follow-up beads ticket is filed BEFORE this atom closes

           No row may be silently ignored. Every instance gets a disposition.

        4. **Store the scan in the bead**:

           ```bash
           bd update {TASK_ID} --append-notes "<disposition table above>"
           ```

        5. **Update the design field** if the disposition table reveals scope
           changes (e.g. you initially planned to fix 1 site, the scan found 8):

           ```bash
           bd update {TASK_ID} --design "<updated design covering all MIGRATE instances>"
           ```

        ## Gate: Add Label

        ONLY after the disposition table is complete (every row has MIGRATE /
        ALLOWLIST / DEFER + a reason) AND every DEFER row has a filed
        follow-up ticket ID:

        ```bash
        bd label add {TASK_ID} codebase-scan:complete
        ```

        ## Anti-Patterns

        - "Disease pattern unclear, scope unbounded" → STOP. The pattern must
          be one-line specifiable. If you can't write the spec, the ticket
          itself is too vague.
        - "Found instances but ignored some" → every row gets a disposition.
        - "DEFER without filing the follow-up ticket" → defer requires a
          beads ticket ID to point at.
        - Skipping this atom because "the cited files are obvious" → the
          point of this atom is what's NOT in the cited files.

      acceptance: "codebase-scan:complete label added (the closure criterion — do NOT close this atom without it). Disposition table in notes covers every found instance AND records the exact reproducible scan command. Every DEFER row points to a filed follow-up ticket."
      depends_on: ["research-{TASK_ID}"]
      labels: ["atom:codebase-scan", "atom:gate"]

    # -- Atom 2: Architect Review ----------------------------------------------
    - id: "review-{TASK_ID}"
      title: "Architect review of {TASK_ID}"
      description: |
        Pragmatic architect review of the research findings for {TASK_ID}.

        ## Precondition

        Both gate labels must be present — the labels ARE the gate, not just
        the depends_on edge (closing the upstream atom without its label is a
        bypass; this hard-check catches it):
        ```bash
        for L in research:complete codebase-scan:complete; do
          bd show {TASK_ID} | grep -q "$L" || { echo "GATE FAIL: missing $L"; exit 1; }
        done
        ```

        The architect review now evaluates the design against the FULL
        codebase scope discovered in the codebase-scan atom — not just the
        cited files.

        ## Review Criteria

        1. **Invariant alignment**: Does EVERY step maintain the Core Invariant?
        2. **Approach soundness**: Will the plan work?
        3. **Risk coverage**: Are risks identified and covered?
        4. **Pattern compliance**: Does the plan follow project architecture patterns?
        5. **Specificity**: Is the plan specific enough to implement without guessing?
        6. **Alternatives**: Was a better approach missed?

        ## Rate Each Finding

        - **LOW**: Minor suggestion, cosmetic, nice-to-have
        - **MEDIUM**: Real concern but agent can resolve autonomously
        - **HIGH**: Fundamental issue -- user input required

        ## Write Review

        ```bash
        bd update {TASK_ID} --append-notes "## Architect Review
        - [RATING] Finding: [description]. Suggestion: [what to do]

        Overall: [ALL_LOW | NEEDS_REFINEMENT | NEEDS_USER_INPUT]"
        ```

      acceptance: "Review written to task notes with rated findings and overall verdict."
      depends_on: ["codebase-scan-{TASK_ID}"]
      labels: ["atom:review", "atom:gate"]

    # -- Atom 3: Triage --------------------------------------------------------
    - id: "triage-{TASK_ID}"
      title: "Triage review findings for {TASK_ID}"
      description: |
        Read the architect review and decide next steps for {TASK_ID}.
        This is a TRIAGE atom -- it routes, not executes.

        ### If ALL_LOW:
        Note "Clean review -- proceeding to implement." Close this atom.

        ### If NEEDS_REFINEMENT:
        Inject a refine atom for the MEDIUM findings and re-point write-test
        at it (it adjusts approach using EXISTING research — it does NOT
        re-research):
        ```bash
        bd create --parent {EPIC_ID} --type task \
          --title "Refine {TASK_ID} per review" \
          --description "<MEDIUM findings to resolve>"      # -> REFINE_ID
        bd dep add write-test-{TASK_ID} <REFINE_ID>          # write-test waits on refine
        ```

        ### If NEEDS_USER_INPUT:
        Block for human direction. Leave this atom OPEN.

        ## Key Principle
        Triage ROUTES work. It does not DO work.

      acceptance: "Verdict acted on."
      depends_on: ["review-{TASK_ID}"]
      labels: ["atom:triage"]

    # -- Atom 4: Write Regression Test (TDD Red) ------------------------------
    - id: "write-test-{TASK_ID}"
      title: "Write regression test for {TASK_ID}"
      description: |
        Write a failing test that defines the expected behavior for {TASK_ID}.
        This is the TDD "red" step -- the test MUST exist and MUST fail before
        any implementation begins.

        ## Instructions

        1. Identify what to test from the implementation plan
        2. Choose test level (prefer integration over unit when DB involved)
        3. Write the failing test
        4. Use test factories for test data (never inline model construction)
        5. Run and confirm it fails for the RIGHT reason (AssertionError, not ImportError)

        ## BANNED Patterns

        - `pytest.mark.xfail` is BANNED in regression tests
        - AST-scanning / source-code pattern tests are BANNED **as a
          substitute for behavioral testing** — when the task changes
          behavior, the red test must exercise that behavior, not scan source.
        - Direct DB session management in test code is BANNED

        ## Structural-disease tasks (no testable behavior)

        Some tasks eliminate a NON-behavioral disease pattern (a casing/naming
        wordmark, an import idiom, a helper-bypass that is type- or
        text-shaped, not runtime-observable). For these, no behavioral failing
        test exists — the only meaningful red artifact IS the structural guard
        that `sweep-verify` will later require. In that case:
        - Write that structural guard HERE, confirm it FAILS (the disease
          instances exist), and record it as the red artifact.
        - The AST/source-text BAN above does NOT apply — it bans source scans
          used INSTEAD OF behavioral tests, not the structural guard that pins
          a structural invariant. The same guard satisfies `sweep-verify`.

        ## Verification: Paste the FAILED Output

        You MUST see the word "FAILED" in pytest output.

        ## Store Test Reference

        ```bash
        bd update {TASK_ID} --append-notes "## Regression Test
        - Test: <test_path>::<test_name>
        - Status: FAILING (expected -- TDD red step)
        - Tests expected behavior: [one sentence]"
        ```

      acceptance: "Failing test exists. Test reference written to task notes."
      depends_on: ["triage-{TASK_ID}"]
      depends_on_prev_barrier: true
      labels: ["atom:write-test"]

    # -- Atom 5: Implement (TDD Green + Refactor) -----------------------------
    - id: "implement-{TASK_ID}"
      title: "Implement {TASK_ID}"
      description: |
        Implement beads task {TASK_ID} -- make the failing test pass (TDD green),
        then refactor.

        ## Workflow

        1. **Green**: Write minimum code to make the failing test pass
        2. **Verify**: Run the SAME test that FAILED -- must now PASS
        3. **Refactor**: With passing tests as safety net
        4. **Quality gate**: Run project quality command

        ## When EXISTING Tests Fail

        1. STOP. Do NOT modify the failing tests.
        2. Re-read the Core Invariant.
        3. If your approach violates the invariant -> revert and rethink.
        4. If the test has a genuine bug -> document WHY before modifying.

        Sacred rule: NEVER adjust tests to match code without justification.

        ## If Successful

        Close the original beads task:
        ```bash
        bd close {TASK_ID}
        ```

      acceptance: "Quality command passes. Regression test passes. Original task closed."
      depends_on: ["write-test-{TASK_ID}"]
      labels: ["atom:implement"]

    # -- Atom 5b: Sweep verification gate --------------------------------------
    - id: "sweep-verify-{TASK_ID}"
      title: "Sweep verification for {TASK_ID}"
      description: |
        Confirm the codebase-scan disposition table is honored end-to-end and
        a structural guard pins the disease pattern going forward.

        Without this atom, a future PR could re-introduce the same pattern in
        a new file and slip the existing guards (which are typically scoped to
        cited files). This atom converts the local fix into a class-level fix.

        ## Precondition

        - `codebase-scan:complete` label on {TASK_ID}
        - Implementation atom closed

        ## Instructions

        1. **Re-run the scan** from the codebase-scan atom. Use the EXACT same
           command recorded in bead notes.

        2. **Compute the diff** between the Phase 1b table and current state:

           ```
           ## Sweep Verification ({TASK_ID})

           Re-scan command: <same as Phase 1b>
           Pre-fix instances: <N from Phase 1b>
           Post-fix instances: <M>

           | # | Phase 1b file:line | Phase 1b disposition | Post-fix state | Verified |
           |---|--------------------|--------------------|----|----|
           | 1 | foo.py:42 | MIGRATE | now uses helper | YES |
           | 2 | bar.py:101 | ALLOWLIST | unchanged | YES (false positive confirmed) |
           | 3 | baz.py:55 | DEFER -> neograph-XXXX | unchanged | YES (deferred ticket open) |
           ```

           Every Phase 1b row must have:
           - MIGRATE rows: the post-fix state shows the helper is now used
           - ALLOWLIST rows: the instance is still there but the false-positive
             reason still holds (re-state it)
           - DEFER rows: the follow-up ticket exists, is open, and tracks the
             remaining instance

           NOTE: a MIGRATE fix shifts line numbers, so do NOT join Phase 1b and
           post-fix rows on `file:line`. Re-localize each row by its matched
           CONTENT (the `Form` column / matched text) and record the new
           location. The deterministic check is the instance-count diff
           (Pre-fix N vs Post-fix M); the per-row join is by content.

        3. **Verify the structural guard exists**. When the disposition table
           has >=1 MIGRATE row, this atom REQUIRES that the implementation (or
           write-test) atom added a structural guard banning future instances
           of the disease pattern (modulo the allowlist). If the table has
           ZERO MIGRATE rows (everything ALLOWLIST/DEFER), no code changed, so
           the guard requirement is N/A — record why, and treat an
           all-ALLOWLIST architectural ticket as suspicious (see anti-patterns).
           The guard must:
             - Live in `tests/test_guards_*.py` (or equivalent)
             - Have at least one positive and one negative meta-test
             - If regex-based, include a "would-be-missed" case as a meta-test.
               Concrete failure mode: a `_neo_isolated_input` key slips a
               `^neo_`-anchored regex because of the leading underscore — the
               meta-test feeds that variant and asserts the guard still catches
               it. (A non-regex guard — AST-walk, import-graph — has no
               regex-slip case; positive + negative suffice.)

           Record the guard reference:

           ```bash
           bd update {TASK_ID} --append-notes "## Structural Guard
           - File: tests/test_guards_<name>.py
           - Class: TestNo<DiseasePattern>
           - Meta-tests: positive=<test_name>, negative=<test_name>, regex-slip=<test_name>"
           ```

        4. **New instances detected** (the sweep found instances NOT in Phase 1b):
           - If the disposition table was incomplete, STOP. Re-do the scan
             properly. The Phase 1b artifact is the contract.
           - If the new instances were introduced BY this ticket (e.g. you
             refactored and accidentally re-introduced the pattern), FAIL.
             Re-implement.

        ## Gate: Add Label

        ONLY after the post-fix table is complete AND the structural guard
        exists:

        ```bash
        bd label add {TASK_ID} sweep:complete
        ```

        ## Anti-Patterns

        - "All Phase 1b rows had ALLOWLIST disposition" → suspicious. The
          ticket may not be doing real work. Re-examine.
        - "Structural guard added but no negative meta-test" → the guard
          itself is a regex-slip risk. Add the meta-test.
        - "Found new instances during sweep, dispositioned silently" → fail.
          Either the Phase 1b scan was incomplete (re-do it) or implementation
          regressed.

      acceptance: "sweep:complete label added (the closure criterion — do NOT close this atom without it). Post-fix disposition table written. When >=1 MIGRATE row exists, a structural guard exists with positive + negative meta-tests (plus a regex-slip meta-test when the guard is regex-based); a zero-MIGRATE table records why the guard is N/A."
      depends_on: ["implement-{TASK_ID}"]
      labels: ["atom:sweep-verify", "atom:gate"]

    # -- Atom 6: Commit --------------------------------------------------------
    - id: "commit-{TASK_ID}"
      title: "Commit implementation for {TASK_ID}"
      description: |
        Commit the implementation for {TASK_ID}.

        ## Precondition

        ALL THREE gate labels must be present (hard-check):
        ```bash
        for L in research:complete codebase-scan:complete sweep:complete; do
          bd show {TASK_ID} | grep -q "$L" || { echo "GATE FAIL: missing $L"; exit 1; }
        done
        ```

        ## Instructions

        1. Review changes: `git status` and `git diff --stat`
        2. Stage specific files (never `git add .`)
        3. Commit with conventional commit message
        4. Verify: `git log -1 --oneline`

      acceptance: "Git commit exists for {TASK_ID} implementation."
      depends_on: ["sweep-verify-{TASK_ID}"]
      labels: ["atom:commit"]

# -- Finalize (after all tasks) ------------------------------------------------
finalize:
  - id: verify-no-regression
    title: "Verify zero regressions vs baseline"
    description: |
      Compare final test results against the baseline.

      ## Instructions

      1. Read the baseline from the epic: `bd show {EPIC_ID}`
      2. Run the full test suite
      3. Compare counts: passes >= baseline, failures = 0
      4. Record final results in epic notes

      ## HARD STOP -- Test Integrity (ZERO TOLERANCE)

      If ANY test fails:
      - Do NOT close this atom.
      - Do NOT use --ignore, -k "not ...", or --deselect.
      - Fix the regressions first.

    acceptance: "All gates pass. Zero regressions vs baseline."
    depends_on_all_barriers: true
    labels: ["atom:verify-regression"]

  - id: sync-and-verify
    title: "Sync beads and verify clean state"
    description: |
      Final cleanup after all {N} tasks.

      1. `bd sync`
      2. Verify all tasks are closed: `bd show {ALL_TASKS}`
      3. Check git state: `git status`

    acceptance: "All {N} tasks closed. bd sync done. git clean."
    depends_on: ["verify-no-regression"]
    labels: ["atom:verify"]
